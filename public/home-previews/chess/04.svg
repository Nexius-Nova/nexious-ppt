<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 Z" fill="#8C2D19" />
        </marker>
    </defs>

    
    <g id="background">
        <rect width="1280" height="720" fill="#F5F2EB" />
    </g>

    
    <g id="title-block">
        
        <rect x="80" y="55" width="12" height="12" fill="#8C2D19" />
        <text x="105" y="70" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#2C3E50">比赛流程与晋级机制</text>
        <text x="80" y="105" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#7F8C8D" letter-spacing="1.5">TOURNAMENT PROCESS AND ADVANCEMENT MECHANISM</text>
        
        
        <line x1="80" y1="125" x2="1200" y2="125" stroke="#D5D0C4" stroke-width="1.5" />
        <rect x="80" y="124" width="180" height="3" fill="#8C2D19" />

        
        <rect x="1140" y="45" width="60" height="60" fill="none" stroke="#8C2D19" stroke-width="2" />
        <rect x="1144" y="49" width="52" height="52" fill="none" stroke="#8C2D19" stroke-width="1" />
        <text x="1170" y="81" font-family="SimSun, Georgia, serif" font-size="24" font-weight="bold" fill="#8C2D19" text-anchor="middle">棋</text>
    </g>

    
    <g id="flow-connectors">
        
        <line x1="325" y1="340" x2="368" y2="340" stroke="#8C2D19" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)" />
        <circle cx="325" cy="340" r="3" fill="#8C2D19" />

        
        <line x1="618" y1="340" x2="661" y2="340" stroke="#8C2D19" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)" />
        <circle cx="618" cy="340" r="3" fill="#8C2D19" />

        
        <line x1="911" y1="340" x2="954" y2="340" stroke="#8C2D19" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)" />
        <circle cx="911" cy="340" r="3" fill="#8C2D19" />
    </g>

    
    <g id="step-card-1">
        <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" d="M88,180 H312 A8,8 0 0 1 320,188 V492 A8,8 0 0 1 312,500 H88 A8,8 0 0 1 80,492 V188 A8,8 0 0 1 88,180 Z" />
        <path fill="#8C2D19" d="M83,180 H317 A3,3 0 0 1 320,183 V183 A3,3 0 0 1 317,186 H83 A3,3 0 0 1 80,183 V183 A3,3 0 0 1 83,180 Z" />
        
        
        <g data-icon="tabler-outline/list-check" x="100" y="205" width="32" height="32" fill="#8C2D19" />
        <text x="300" y="232" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19" text-anchor="end">01</text>
        
        
        <text x="100" y="275" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">前期筹备</text>
        <text x="100" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#7F8C8D" letter-spacing="1">PREPARATION</text>
        
        <line x1="100" y1="315" x2="300" y2="315" stroke="#D5D0C4" stroke-width="1" />
        
        
        <circle cx="105" cy="345" r="3" fill="#8C2D19" />
        <text x="120" y="350" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">各班级下发赛事通知</text>
        
        <circle cx="105" cy="385" r="3" fill="#8C2D19" />
        <text x="120" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">统计并核对参赛人数</text>
        
        <circle cx="105" cy="425" r="3" fill="#8C2D19" />
        <text x="120" y="430" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">联系棋社准备比赛棋具</text>
    </g>

    
    <g id="step-card-2">
        <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" d="M381,180 H605 A8,8 0 0 1 613,188 V492 A8,8 0 0 1 605,500 H381 A8,8 0 0 1 373,492 V188 A8,8 0 0 1 381,180 Z" />
        <path fill="#8C2D19" d="M376,180 H610 A3,3 0 0 1 613,183 V183 A3,3 0 0 1 610,186 H376 A3,3 0 0 1 373,183 V183 A3,3 0 0 1 376,180 Z" />
        
        
        <g data-icon="tabler-outline/layout-dashboard" x="393" y="205" width="32" height="32" fill="#8C2D19" />
        <text x="593" y="232" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19" text-anchor="end">02</text>
        
        
        <text x="393" y="275" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">赛项设置</text>
        <text x="393" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#7F8C8D" letter-spacing="1">EVENT SETUP</text>
        
        <line x1="393" y1="315" x2="593" y2="315" stroke="#D5D0C4" stroke-width="1" />
        
        
        <circle cx="398" cy="345" r="3" fill="#8C2D19" />
        <text x="413" y="350" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">分为五子棋与中国象棋</text>
        
        <circle cx="398" cy="385" r="3" fill="#8C2D19" />
        <text x="413" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">双赛项同步独立进行</text>
        
        <circle cx="398" cy="425" r="3" fill="#8C2D19" />
        <text x="413" y="430" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">每位选手限报其中一项</text>
    </g>

    
    <g id="step-card-3">
        <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" d="M674,180 H898 A8,8 0 0 1 906,188 V492 A8,8 0 0 1 898,500 H674 A8,8 0 0 1 666,492 V188 A8,8 0 0 1 674,180 Z" />
        <path fill="#8C2D19" d="M669,180 H903 A3,3 0 0 1 906,183 V183 A3,3 0 0 1 903,186 H669 A3,3 0 0 1 666,183 V183 A3,3 0 0 1 669,180 Z" />
        
        
        <g data-icon="tabler-outline/users" x="686" y="205" width="32" height="32" fill="#8C2D19" />
        <text x="886" y="232" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19" text-anchor="end">03</text>
        
        
        <text x="686" y="275" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">对决方式</text>
        <text x="686" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#7F8C8D" letter-spacing="1">MATCHMAKING</text>
        
        <line x1="686" y1="315" x2="886" y2="315" stroke="#D5D0C4" stroke-width="1" />
        
        
        <circle cx="691" cy="345" r="3" fill="#8C2D19" />
        <text x="706" y="350" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">现场随机抽签决定序号</text>
        
        <circle cx="691" cy="385" r="3" fill="#8C2D19" />
        <text x="706" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">两两对弈（如1对2）</text>
        
        <circle cx="691" cy="425" r="3" fill="#8C2D19" />
        <text x="706" y="430" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">首轮尽量规避同班内战</text>
    </g>

    
    <g id="step-card-4">
        <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" d="M967,180 H1191 A8,8 0 0 1 1199,188 V492 A8,8 0 0 1 1191,500 H967 A8,8 0 0 1 959,492 V188 A8,8 0 0 1 967,180 Z" />
        <path fill="#8C2D19" d="M962,180 H1196 A3,3 0 0 1 1199,183 V183 A3,3 0 0 1 1196,186 H962 A3,3 0 0 1 959,183 V183 A3,3 0 0 1 962,180 Z" />
        
        
        <g data-icon="tabler-outline/target" x="979" y="205" width="32" height="32" fill="#8C2D19" />
        <text x="1179" y="232" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19" text-anchor="end">04</text>
        
        
        <text x="979" y="275" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">晋级淘汰</text>
        <text x="979" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#7F8C8D" letter-spacing="1">ELIMINATION</text>
        
        <line x1="979" y1="315" x2="1179" y2="315" stroke="#D5D0C4" stroke-width="1" />
        
        
        <circle cx="984" cy="345" r="3" fill="#8C2D19" />
        <text x="999" y="350" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">比赛采取单败淘汰制</text>
        
        <circle cx="984" cy="385" r="3" fill="#8C2D19" />
        <text x="999" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">每轮胜者直接晋级下轮</text>
        
        <circle cx="984" cy="425" r="3" fill="#8C2D19" />
        <text x="999" y="430" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2C3E50">决赛决出最终冠亚季军</text>
    </g>

    
    <g id="summary-bar">
        <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" d="M88,540 H1192 A8,8 0 0 1 1200,548 V612 A8,8 0 0 1 1192,620 H88 A8,8 0 0 1 80,612 V548 A8,8 0 0 1 88,540 Z" />
        <path fill="#8C2D19" d="M83,540 H83 A3,3 0 0 1 86,543 V617 A3,3 0 0 1 83,620 H83 A3,3 0 0 1 80,617 V543 A3,3 0 0 1 83,540 Z" />
        
        <g data-icon="tabler-outline/bulb" x="105" y="564" width="32" height="32" fill="#8C2D19" />
        
        <text x="150" y="588" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#8C2D19">核心机制</text>
        
        <line x1="240" y1="555" x2="240" y2="605" stroke="#D5D0C4" stroke-width="1" />
        
        <text x="260" y="586" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#2C3E50">比赛采用严格的单败淘汰制，确保赛程紧凑与公正。两两对决，一局定胜负，直至决出冠军。</text>
    </g>
</svg>