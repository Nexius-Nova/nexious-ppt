<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  
  <g id="background-chrome">
    
    <rect width="1280" height="720" fill="#F5F2EB" />
    
    
    
    <line x1="80" y1="200" x2="1200" y2="200" stroke="#D5D0C4" stroke-width="1" />
    <line x1="80" y1="310" x2="1200" y2="310" stroke="#D5D0C4" stroke-width="1" />
    <line x1="80" y1="420" x2="1200" y2="420" stroke="#D5D0C4" stroke-width="1" />
    <line x1="80" y1="530" x2="1200" y2="530" stroke="#D5D0C4" stroke-width="1" />
    <line x1="80" y1="640" x2="1200" y2="640" stroke="#D5D0C4" stroke-width="1" />
    
    
    <line x1="100" y1="180" x2="100" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="260" y1="180" x2="260" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="420" y1="180" x2="420" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="580" y1="180" x2="580" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="740" y1="180" x2="740" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="900" y1="180" x2="900" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="1060" y1="180" x2="1060" y2="660" stroke="#D5D0C4" stroke-width="1" />
    <line x1="1180" y1="180" x2="1180" y2="660" stroke="#D5D0C4" stroke-width="1" />

    
    <circle cx="580" cy="420" r="4" fill="#7F8C8D" />
    <circle cx="260" cy="310" r="4" fill="#7F8C8D" />
    <circle cx="900" cy="310" r="4" fill="#7F8C8D" />
    <circle cx="260" cy="530" r="4" fill="#7F8C8D" />
    <circle cx="900" cy="530" r="4" fill="#7F8C8D" />

    
    
    <circle cx="1060" cy="200" r="16" fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" />
    <circle cx="1092" cy="200" r="16" fill="#2C3E50" />
    
    <circle cx="100" cy="640" r="16" fill="#2C3E50" />
    <circle cx="132" cy="640" r="16" fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1.5" />

    
    <rect x="1140" y="80" width="40" height="40" fill="#8C2D19" />
    <text x="1160" y="108" font-family="Georgia, SimSun, serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">棋</text>
  </g>

  
  <g id="header-block">
    
    <text x="100" y="95" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50" letter-spacing="2">BACKGROUND &amp; SIGNIFICANCE</text>
    
    
    <text x="100" y="145" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#8C2D19">活动背景与核心意义</text>
    
    
    <line x1="100" y1="170" x2="360" y2="170" stroke="#8C2D19" stroke-width="3" />
  </g>

  
  <g id="content-card-1">
    
    <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1" d="M104,230 H416 A4,4 0 0 1 420,234 V596 A4,4 0 0 1 416,600 H104 A4,4 0 0 1 100,596 V234 A4,4 0 0 1 104,230 Z" />
    
    <path fill="#8C2D19" d="M102,230 H418 A2,2 0 0 1 420,232 V234 A2,2 0 0 1 418,236 H102 A2,2 0 0 1 100,234 V232 A2,2 0 0 1 102,230 Z" />
    
    
    <text x="130" y="290" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19">01</text>
    
    
    <g data-icon="tabler-outline/target" x="350" y="255" width="36" height="36" fill="#8C2D19" />
    
    
    <text x="130" y="340" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">弘扬棋艺文化</text>
    
    
    <line x1="130" y1="360" x2="200" y2="360" stroke="#D5D0C4" stroke-width="2" />
    
    
    <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="130" y="405">传承中华民族结晶，</text><text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="130" y="437">展现沉稳和睿智的</text><text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="130" y="469">对决精神。</text></g>

  
  <g id="content-card-2">
    
    <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1" d="M484,230 H796 A4,4 0 0 1 800,234 V596 A4,4 0 0 1 796,600 H484 A4,4 0 0 1 480,596 V234 A4,4 0 0 1 484,230 Z" />
    
    <path fill="#8C2D19" d="M482,230 H798 A2,2 0 0 1 800,232 V234 A2,2 0 0 1 798,236 H482 A2,2 0 0 1 480,234 V232 A2,2 0 0 1 482,230 Z" />
    
    
    <text x="510" y="290" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19">02</text>
    
    
    <g data-icon="tabler-outline/users" x="730" y="255" width="36" height="36" fill="#8C2D19" />
    
    
    <text x="510" y="340" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">丰富校园生活</text>
    
    
    <line x1="510" y1="360" x2="580" y2="360" stroke="#D5D0C4" stroke-width="2" />
    
    
    <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="510" y="405">为同学们提供展示</text><text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="510" y="437">自我的舞台，加强</text><text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="510" y="469">跨班级交流合作。</text></g>

  
  <g id="content-card-3">
    
    <path fill="#FFFFFF" stroke="#D5D0C4" stroke-width="1" d="M864,230 H1176 A4,4 0 0 1 1180,234 V596 A4,4 0 0 1 1176,600 H864 A4,4 0 0 1 860,596 V234 A4,4 0 0 1 864,230 Z" />
    
    <path fill="#8C2D19" d="M862,230 H1178 A2,2 0 0 1 1180,232 V234 A2,2 0 0 1 1178,236 H862 A2,2 0 0 1 860,234 V232 A2,2 0 0 1 862,230 Z" />
    
    
    <text x="890" y="290" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#8C2D19">03</text>
    
    
    <g data-icon="tabler-outline/bulb" x="1110" y="255" width="36" height="36" fill="#8C2D19" />
    
    
    <text x="890" y="340" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">提升逻辑思维</text>
    
    
    <line x1="890" y1="360" x2="960" y2="360" stroke="#D5D0C4" stroke-width="2" />
    
    
    <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="890" y="405">锻炼思考问题的全</text><text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="890" y="437">面性，培养严谨的</text><text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" fill="#2C3E50" font-size="18" x="890" y="469">逻辑与大局观。</text></g>

  
  <g id="footer-chrome">
    
    <line x1="100" y1="670" x2="1180" y2="670" stroke="#D5D0C4" stroke-width="1" />
    
    
    <text x="100" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#7F8C8D">高校棋艺锦标赛策划案</text>
    <text x="1180" y="695" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#8C2D19" text-anchor="end">02</text>
  </g>
</svg>