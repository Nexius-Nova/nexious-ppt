    <line x1="333" y1="326" x2="357" y2="344" stroke="#A9B0C3" stroke-width="2" />
    <line x1="357" y1="344" x2="318" y2="358" stroke="#A9B0C3" stroke-width="2" />
    <line x1="318" y1="358" x2="304" y2="332" stroke="#A9B0C3" stroke-width="2" />
    <text x="285" y="376" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">数字制作</text>
    <line x1="229" y1="347" x2="263" y2="347" stroke="#F5A623" stroke-width="2" />
    <polygon points="263,347 253,341 253,353" fill="#F5A623" />
    <rect x="100" y="432" width="294" height="82" rx="12" fill="#F7F3EA" />
    <path d="M126 473 L160 445 L194 473 L228 446 L262 473 L296 447 L330 473 L365 448" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <rect x="123" y="456" width="244" height="34" fill="#1B1F3B" />
    <circle cx="168" cy="473" r="6" fill="#F5A623" />
    <circle cx="247" cy="473" r="6" fill="#00A7A7" />
    <circle cx="326" cy="473" r="6" fill="#F5A623" />
    <text x="138" y="538" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">最终银幕画面 = 真实表演 + 可控想象</text>
    <path d="M89 220 L137 220 M89 220 L89 268" fill="none" stroke="#F5A623" stroke-width="2" />
    <path d="M405 220 L357 220 M405 220 L405 268" fill="none" stroke="#F5A623" stroke-width="2" />
