  <g id="reasons-grid">
    <rect x="456" y="205" width="364" height="166" rx="18" fill="#1B1F3B" stroke="#3A3F5C" stroke-width="2" />
    <rect x="478" y="227" width="44" height="44" rx="12" fill="#F5A623" />
    <path d="M490 255 L499 244 L510 255 L518 247" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <text x="540" y="242" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="700">01 观众期待更大场面</text>
    <text x="540" y="276" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20">
      <tspan x="540" dy="0">外星世界、超级英雄、灾难场景</tspan>
      <tspan x="540" dy="28">很难完全依靠实拍完成</tspan>
    </text>
    <rect x="485" y="306" width="300" height="38" rx="8" fill="#0E1020" />
    <text x="506" y="331" fill="#00A7A7" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">目标：让银幕尺度超过现实片场</text>
    <rect x="846" y="205" width="364" height="166" rx="18" fill="#1B1F3B" stroke="#3A3F5C" stroke-width="2" />
    <rect x="868" y="227" width="44" height="44" rx="12" fill="#00A7A7" />
    <path d="M890 238 L904 245 L900 264 L890 270 L880 264 L876 245 Z" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <path d="M882 254 L888 260 L900 247" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <text x="930" y="242" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="700">02 制作需要更安全</text>
    <text x="930" y="276" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20">
      <tspan x="930" dy="0">危险动作、爆炸、极端环境</tspan>
      <tspan x="930" dy="28">可以用数字方式补充</tspan>
    </text>
    <rect x="875" y="306" width="300" height="38" rx="8" fill="#0E1020" />
    <text x="896" y="331" fill="#F5A623" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">目标：降低演员与剧组真实风险</text>
    <rect x="456" y="393" width="364" height="166" rx="18" fill="#1B1F3B" stroke="#3A3F5C" stroke-width="2" />
    <rect x="478" y="415" width="44" height="44" rx="12" fill="#00A7A7" />
    <circle cx="500" cy="437" r="12" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <circle cx="495" cy="434" r="2" fill="#1B1F3B" />
    <circle cx="505" cy="434" r="2" fill="#1B1F3B" />
    <path d="M494 445 Q500 450 506 445" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <text x="540" y="430" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="700">03 创作边界被扩大</text>
    <text x="540" y="464" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20">
      <tspan x="540" dy="0">不存在的生物、年轻化角色、</tspan>
      <tspan x="540" dy="28">幻想城市都能被创造</tspan>
    </text>
    <rect x="485" y="494" width="300" height="38" rx="8" fill="#0E1020" />
    <text x="506" y="519" fill="#F5A623" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">目标：让导演拍到原来拍不到</text>
    <rect x="846" y="393" width="364" height="166" rx="18" fill="#1B1F3B" stroke="#3A3F5C" stroke-width="2" />
    <rect x="868" y="415" width="44" height="44" rx="12" fill="#F5A623" />
    <rect x="881" y="428" width="18" height="18" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <path d="M876 452 L904 424" fill="none" stroke="#1B1F3B" stroke-width="2" />
    <text x="930" y="430" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="700">04 成本与效率重分配</text>
    <text x="930" y="464" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20">
      <tspan x="930" dy="0">前期可预览，后期可修改，</tspan>
      <tspan x="930" dy="28">团队可远程协作</tspan>
    </text>
    <rect x="875" y="494" width="300" height="38" rx="8" fill="#0E1020" />
    <text x="896" y="519" fill="#00A7A7" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">目标：把成本花在更可控的位置</text>
  </g>
  <g id="bottom-note">
    <rect x="70" y="572" width="1140" height="42" rx="17" fill="#0E1020" stroke="#3A3F5C" stroke-width="2" />
    <circle cx="95" cy="593" r="7" fill="#F5A623" />
    <text x="116" y="598" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700">一句话理解：</text>
    <text x="222" y="598" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">技术让电影拍到原来拍不到、拍不起或不安全的内容。</text>
  </g>
</svg>