  <g id="title-block">
    <text x="70" y="134" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="700">为什么电影越来越依赖技术？</text>
    <text x="73" y="170" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20">从“摄影机记录现实”，到“现实拍摄 + 数字制作”共同完成银幕画面</text>
    <rect x="1072" y="118" width="138" height="40" rx="20" fill="#F5A623" />
    <text x="1103" y="145" fill="#1B1F3B" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="700">TECH</text>
  </g>
  <g id="logic-diagram">
    <rect x="70" y="205" width="354" height="354" rx="18" fill="#1B1F3B" stroke="#3A3F5C" stroke-width="2" />
    <text x="100" y="242" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="700">画面生成逻辑</text>
    <text x="100" y="274" fill="#A9B0C3" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">技术不是炫技，而是补足“拍不到”的部分</text>
    <rect x="100" y="304" width="128" height="86" rx="10" fill="#0E1020" stroke="#3A3F5C" stroke-width="2" />
    <path d="M118 348 L145 328 L173 350 L197 332 L210 346" fill="none" stroke="#00A7A7" stroke-width="2" />
    <circle cx="136" cy="330" r="7" fill="#F5A623" />
    <text x="119" y="376" fill="#F4F1E8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14">现实拍摄</text>
    <rect x="266" y="304" width="128" height="86" rx="10" fill="#0E1020" stroke="#3A3F5C" stroke-width="2" />
    <circle cx="304" cy="332" r="5" fill="#00A7A7" />
    <circle cx="333" cy="326" r="5" fill="#00A7A7" />
    <circle cx="357" cy="344" r="5" fill="#00A7A7" />
